# Production compose stack — Coolify-ready.
#
# Differences from a vanilla compose:
#   * No ``ports:`` mapping. The container only ``expose:``s its port on the
#     Docker network so Coolify's Traefik can reach it; nothing is published
#     on the host. (Locally you can still ``curl`` it from another container
#     or add a one-off ``docker run -p`` for ad-hoc tests.)
#   * ``SERVICE_FQDN_WEB_3000`` is the Coolify magic env var: Coolify reads
#     it during deploy, generates a Traefik router for service ``web`` on
#     port ``3000``, terminates TLS at the edge, and rewrites the variable
#     with the assigned ``https://…`` URL inside the container.
#   * uvicorn listens on ``0.0.0.0:3000``.
#
# Coolify deployment:
#   1. Create a new "Docker Compose" resource pointing at this file.
#   2. Set the required env vars (DJANGO_SECRET_KEY at minimum) in the UI.
#   3. Coolify assigns/asks for a domain for SERVICE_FQDN_WEB_3000.
#   4. Deploy. Traefik handles HTTPS automatically.
#
# Standalone use (no Coolify):
#   docker compose -f docker-compose.prod.yml up --build
#   docker compose -f docker-compose.prod.yml exec web curl -fsS http://localhost:3000/_health
#   # To publish on the host for local prod smoke-testing, add an override:
#   #   docker compose -f docker-compose.prod.yml -f docker-compose.prod.local.yml up
#   # where docker-compose.prod.local.yml maps ``ports: ["3000:3000"]``.
#
# Postgres + Redis (recommended for >1 worker):
#   docker compose -f docker-compose.prod.yml --profile postgres --profile redis up --build

services:
  web:
    build:
      context: .
      target: runtime
      args:
        # Build-time secret used only by ``export_reflex`` while compiling the
        # SPA. The runtime secret comes from ``DJANGO_SECRET_KEY`` below.
        DJANGO_SECRET_KEY: ${DJANGO_BUILD_SECRET_KEY:-build-only-key-replace-at-runtime}
    image: rxdjango-dashboard:prod
    command:
      - uvicorn
      - reflex_django.asgi_entry:application
      - --host
      - 0.0.0.0
      - --port
      - "3000"
      - --workers
      - "${UVICORN_WORKERS:-2}"
      - --proxy-headers
      - --forwarded-allow-ips
      - "*"
    # ``expose`` advertises the port to other containers on the same Docker
    # network (Coolify's Traefik joins this network automatically) without
    # publishing it on the host. No ``ports:`` block on purpose.
    expose:
      - "3000"
    env_file:
      - path: .env
        required: false
    environment:
      # ----- Coolify FQDN magic -----------------------------------------
      # IMPORTANT: do NOT wrap this in ${...} — Coolify pattern-matches on
      # the literal ``SERVICE_FQDN_<SERVICE>_<PORT>`` key. The value must
      # be either empty (Coolify auto-assigns a ``*.sslip.io`` domain on
      # first deploy) or a hard-coded ``https://<your-domain>``. Edit the
      # actual domain from the service's **Domains** tab in the Coolify
      # UI — it is locked in the Environment Variables tab because the
      # Domains UI owns it. After deploy Coolify also injects the
      # read-only derivatives ``SERVICE_URL_WEB`` and
      # ``SERVICE_URL_WEB_3000`` (host-only, no scheme).
      SERVICE_FQDN_WEB_3000: ""
      # ----- Django ------------------------------------------------------
      DJANGO_SETTINGS_MODULE: backend.settings
      DJANGO_DEBUG: "0"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?Set DJANGO_SECRET_KEY in .env / Coolify env}
      # Coolify terminates TLS, so the secure-cookie / HSTS block in
      # ``backend/settings.py`` flips on automatically. If you ever run this
      # compose without a TLS-terminating proxy in front, set
      # ``DJANGO_BEHIND_TLS_PROXY=0`` in the env to relax cookie flags.
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-}
      # ----- Database ----------------------------------------------------
      # Defaults to SQLite on a named volume; flip ``DJANGO_DB_ENGINE`` to
      # ``postgresql`` (and enable the ``postgres`` profile) for >1 worker.
      DJANGO_DB_ENGINE: ${DJANGO_DB_ENGINE:-sqlite}
      DJANGO_DB_PATH: /data/db.sqlite3
      DJANGO_DB_NAME: ${DJANGO_DB_NAME:-rxdjango}
      DJANGO_DB_USER: ${DJANGO_DB_USER:-rxdjango}
      DJANGO_DB_PASSWORD: ${DJANGO_DB_PASSWORD:-}
      DJANGO_DB_HOST: ${DJANGO_DB_HOST:-db}
      DJANGO_DB_PORT: ${DJANGO_DB_PORT:-5432}
      # ----- Optional: Redis-backed state manager (required for >1 worker)
      REDIS_URL: ${REDIS_URL:-}
      # ----- Misc --------------------------------------------------------
      SERVE_MEDIA: "1"
      RUN_COLLECTSTATIC: "0"
    volumes:
      - dashboard-db:/data
      - dashboard-media:/app/media
      - dashboard-uploads:/app/uploaded_files
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/_health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy
        required: false
      redis:
        condition: service_healthy
        required: false

  # Postgres database. Activate with ``--profile postgres`` together with
  # ``DJANGO_DB_ENGINE=postgresql`` in the env. Not exposed on the host —
  # only the ``web`` service can reach it on the internal network.
  db:
    image: postgres:16-alpine
    profiles: ["postgres"]
    environment:
      POSTGRES_DB: ${DJANGO_DB_NAME:-rxdjango}
      POSTGRES_USER: ${DJANGO_DB_USER:-rxdjango}
      POSTGRES_PASSWORD: ${DJANGO_DB_PASSWORD:-}
    volumes:
      - dashboard-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DJANGO_DB_USER:-rxdjango}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis for Reflex state-manager + Django cache. Internal-only.
  redis:
    image: redis:7-alpine
    profiles: ["redis"]
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - dashboard-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  dashboard-db:
  dashboard-media:
  dashboard-uploads:
  dashboard-pgdata:
  dashboard-redis:
